version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: secondbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/V001__init.sql:/docker-entrypoint-initdb.d/V001__init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d secondbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  brain-core:
    build:
      context: .
      dockerfile: brain-core/Dockerfile
    environment:
      SB_DATABASE_URL: postgresql+asyncpg://brain:brain@db:5432/secondbrain
      SB_DATABASE_URL_SYNC: postgresql://brain:brain@db:5432/secondbrain
      SB_DEBUG: "true"
      SB_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8080","http://127.0.0.1:8080"]'
      SB_ENRICHED_SCHEMA_PATH: /app/schemas/enriched_contract.schema.json
      SB_LLM_PROVIDER: ${SB_LLM_PROVIDER:-anthropic}
      SB_LLM_MODEL: ${SB_LLM_MODEL:-claude-haiku-4-5}
      SB_LLM_API_KEY: ${SB_LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./brain-core/src:/app/src
      - ./schemas:/app/schemas
      - ./skills:/app/skills
      - ./storage:/app/storage

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    environment:
      SB_MCP_API_BASE: http://brain-core:8000
      SB_MCP_HOST: 0.0.0.0
      SB_MCP_PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      - brain-core
    volumes:
      - ./mcp-server/server.py:/app/server.py

volumes:
  pgdata:
